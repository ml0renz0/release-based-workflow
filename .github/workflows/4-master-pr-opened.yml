name: Step 4, master pull request opened

# This step triggers after 3-feature-added-to-develop.yml.
# This workflow updates from step 4 to step 5.

# This will run every time a pull request is opened to master.
# Reference: https://docs.github.com/en/actions/learn-github-actions/events-that-trigger-workflows
on:
  workflow_dispatch:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  # Get the current step to only run the master job when the learner is on the same step.
  get_current_step:
    name: Check current step number
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: curso
      - id: get_step
        run: |
          echo "current_step=$(cat ./.github/steps/-step.txt)" >> $GITHUB_OUTPUT
    outputs:
      current_step: ${{ steps.get_step.outputs.current_step }}

  check_master_pr_title:
    name: Check PR title
    needs: get_current_step
    if: >-
      ${{ !github.event.repository.is_template
          && needs.get_current_step.outputs.current_step == 4
          && github.head_ref == 'develop' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # para poder fallar el check y dejar comentarios (opcional)

    steps:
      - name: Comprobar patrón del título de la PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr    = context.payload.pull_request;
            const title = pr.title.trim();
            const ok = /^\[(RELEASE|HOTFIX)\]\s+.+$/i.test(title);
            if (ok) {
              core.info(`✅ Título válido`);
            } else {
              core.setFailed(
                `❌ El título de la PR no cumple el patrón "[RELEASE] - <old_version>#<new_version>".\n` +
                `Ejemplos válidos:.\n` +
                `  [RELEASE] <mensaje>.\n` +
                `  [HOTFIX] <mensaje>`
              )
            }

  on_master_pr_opened:
    name: Report check master PR title
    needs: check_master_pr_title

    # We will only run this action when:
    # 1. This repository isn't the template repository.
    # 2. The step is currently 4.
    # 3. The pull request head branch is 'develop'.
    # 4. The PR title follows the pattern `[RELEASE] - <old_version>#<new_version>`.
    # Reference: https://docs.github.com/en/actions/learn-github-actions/contexts
    # Reference: https://docs.github.com/en/actions/learn-github-actions/expressions
    if: ${{ needs.check_master_pr_title.result == 'success' }}

    # We'll run Ubuntu for performance instead of Mac or Windows.
    runs-on: ubuntu-latest

    steps:
      # We'll need to check out the repository so that we can edit the README.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Update README from step 4 to step 5.
      - name: Update to step 5
        uses: skills/action-update-step@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base_branch_name: curso
          from_step: 4
          to_step: 5
